
<!DOCTYPE html>
<html lang="en">
<head>

    <title>Primrose Speciality Coffee | Parallax Brochure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <div class="content-overlay" id="content-3"></div>

        <div class="content-overlay" id="content-4"></div>

        <div class="content-overlay" id="content-5"></div>

        <div class="content-overlay" id="content-12"></div>
    </main>

    <div class="social-bar">
        <a href="https://wa.me/251911513747" target="_blank" class="social-link" title="WhatsApp">WA</a>
        <a href="https://instagram.com/Primrose.coffee" target="_blank" class="social-link" title="Instagram">IG</a>
        <a href="javascript:void(0)" onclick="showWeChat()" class="social-link" title="WeChat">WX</a>
    </div>

    <div id="wechat-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; align-items:center; justify-content:center; flex-direction:column; padding: 2rem;">
        <h2>WeChat ID</h2>
        <p style="font-size: 1.5rem; font-weight: bold;">wxid_908d546yxmnh22</p>
        <button onclick="closeWeChat()" style="margin-top: 2rem; background: var(--primary-color);">Close</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
