
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primrose Speciality Coffee | Parallax Brochure</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="lang-en">
    <header>
        <div class="logo">PRIMROSE</div>
        <button class="lang-toggle" onclick="toggleLanguage()">中文 / EN</button>
    </header>

    <main id="parallax-container">
        <!-- 12 Sections with Nested Content Overlays -->
        <section id="section-1" class="parallax-section" style="background-image: url('page_1.png');">
            <div class="content-overlay" id="content-1"></div>
        </section>
        
        <section id="section-2" class="parallax-section" style="background-image: url('page_2.png');">
            <div class="content-overlay" id="content-2"></div>
        </section>

        <section id="section-3" class="parallax-section" style="background-image: url('page_3.png');">
            <div class="content-overlay" id="content-3"></div>
        </section>

        <section id="section-4" class="parallax-section" style="background-image: url('page_4.png');">
            <div class="content-overlay" id="content-4"></div>
        </section>

        <section id="section-5" class="parallax-section" style="background-image: url('page_5.png');">
            <div class="content-overlay" id="content-5"></div>
        </section>

        <section id="section-6" class="parallax-section" style="background-image: url('page_6.png');">
            <div class="content-overlay" id="content-6"></div>
        </section>

        <section id="section-7" class="parallax-section" style="background-image: url('page_7.png');">
            <div class="content-overlay" id="content-7"></div>
        </section>

        <section id="section-8" class="parallax-section" style="background-image: url('page_8.png');">
            <div class="content-overlay" id="content-8"></div>
        </section>

        <section id="section-9" class="parallax-section" style="background-image: url('page_9.png');">
            <div class="content-overlay" id="content-9"></div>
        </section>

        <section id="section-10" class="parallax-section" style="background-image: url('page_10.png');">
            <div class="content-overlay" id="content-10"></div>
        </section>

        <section id="section-11" class="parallax-section" style="background-image: url('page_11.png');">
            <div class="content-overlay" id="content-11"></div>
        </section>

        <section id="section-12" class="parallax-section" style="background-image: url('page_12.png');">
            <div class="content-overlay" id="content-12"></div>
        </section>
    </main>

    <div class="social-bar">
        <a href="https://wa.me/251911513747" target="_blank" class="social-link" title="WhatsApp">
            <i class="fa-brands fa-whatsapp"></i>
        </a>
        <a href="https://instagram.com/Primrose.coffee" target="_blank" class="social-link" title="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="javascript:void(0)" onclick="showWeChat()" class="social-link" title="WeChat">
            <i class="fa-brands fa-weixin"></i>
        </a>
    </div>

    <div id="wechat-modal">
        <h2>WeChat ID</h2>
        <div class="wechat-id-container">
            <span id="wechat-id-text" style="font-size: 1.3rem; font-weight: bold; letter-spacing: 1px;">wxid_908d546yxmnh22</span>
            <i class="fa-regular fa-copy copy-btn" id="copy-icon" onclick="copyWeChat()" title="Copy ID"></i>
        </div>
        <p id="copy-status" style="font-size: 0.8rem; color: var(--primary-color); height: 1.2rem; margin-bottom: 1rem; opacity: 0;"></p>
        <button onclick="closeWeChat()">Close</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
